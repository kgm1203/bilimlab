<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim-Lab AI | Сыдықова Ақтоты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --dark: #202124; }
        body { font-family: 'Times New Roman', serif; background: #f4f6f8; margin: 0; color: var(--dark); line-height: 1.6; }
        
        header { background: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--blue); }
        .logo-container svg { width: 150px; height: auto; }
        
        .container { max-width: 950px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-left: 6px solid var(--blue); }
        
        .ai-section { background: #f8faff; padding: 25px; border-radius: 12px; border: 1px solid #d1e3fa; }
        textarea { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #cbd5e0; font-size: 17px; box-sizing: border-box; outline: none; }
        
        .btn-main { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 15px; }
        
        /* КЕСТЕ СТИЛІ */
        .res-table { width: 100%; border-collapse: collapse; background: white; border: 2px solid var(--blue); margin-top: 20px; display: none; animation: fadeIn 0.5s; }
        .res-table th { background: #f1f5f9; padding: 15px; text-align: left; border: 1px solid #cbd5e0; color: var(--blue); font-size: 18px; }
        .res-table td { padding: 15px; border: 1px solid #cbd5e0; font-size: 17px; vertical-align: top; }
        
        .tag { display: inline-block; background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 180 Q150 140 240 180 L240 200 Q150 160 60 200 Z" stroke="#1E88E5" stroke-width="4" fill="none"/>
            <circle cx="150" cy="120" r="6" fill="#00ACC1"/><circle cx="120" cy="140" r="6" fill="#00ACC1"/><circle cx="180" cy="140" r="6" fill="#00ACC1"/><circle cx="150" cy="160" r="6" fill="#00ACC1"/>
            <line x1="150" y1="120" x2="120" y2="140" stroke="#00ACC1"/><line x1="150" y1="120" x2="180" y2="140" stroke="#00ACC1"/><line x1="120" y1="140" x2="150" y2="160" stroke="#00ACC1"/><line x1="180" y1="140" x2="150" y2="160" stroke="#00ACC1"/>
            <path d="M145 80 L155 80 L155 110 L165 130 L135 130 L145 110 Z" stroke="#26A69A" stroke-width="3" fill="none"/>
            <path d="M150 70 Q140 85 150 90 Q160 85 150 70 Z" fill="#66BB6A"/>
            <text x="150" y="250" text-anchor="middle" font-size="32" font-family="Arial" font-weight="bold" fill="#1565C0">bilim.lab</text>
        </svg>
    </div>
    <h1>BILIM-LAB AI</h1>
</header>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-magic"></i> Дескрипторлар генераторы</h2>
        <div class="ai-section">
            <textarea id="topicInp" rows="3" placeholder="Тақырыпты енгізіңіз (мысалы: Өсімдіктер әлемі)"></textarea>
            <button class="btn-main" onclick="generateTemplate()">ГЕНЕРАЦИЯ ЖАСАУ</button>
        </div>

        <table class="res-table" id="resTable">
            <thead>
                <tr>
                    <th>Бағалау критерийі</th>
                    <th>Тапсырма</th>
                    <th>Дескрипторлар</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="colCrit"></td>
                    <td id="colTask"></td>
                    <td id="colDesc"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function generateTemplate() {
        const topic = document.getElementById('topicInp').value.trim();
        if(!topic) return alert("Тақырыпты жазыңыз!");

        // Кестені толтыру (Сіздің үлгіңіз бойынша)
        document.getElementById('colCrit').innerHTML = `<span class="tag">Критерий</span><br>Өсімдік мүшелерін таниды және олардың маңызын сипаттайды.`;
        
        document.getElementById('colTask').innerHTML = `<span class="tag">"Жас зерттеуші" әдісі</span><br>Берілген өсімдік суретіндегі мүшелерді атап, олардың қызметін түсіндіріңіз.`;
        
        document.getElementById('colDesc').innerHTML = `
            1. Өсімдік мүшелерін суреттен дұрыс тауып, атайды;<br>
            2. Тамыр мен сабақтың айырмашылығын түсіндіреді;<br>
            3. Жапырақтың маңызын сипаттайды.`;

        // Кестені көрсету
        document.getElementById('resTable').style.display = 'table';
    }
</script>

</body>
</html>
